<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WowoClean - Manajemen Limbah B3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f0f2f5; 
            padding-top: 40px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card { 
            border-radius: 12px; 
            border: none; 
        }
        .shadow-custom {
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .total-badge { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            z-index: 1000; 
            font-size: 1rem; 
            padding: 10px 20px; 
            border-radius: 50px;
            border: none;
        }
        .error-msg { 
            color: #dc3545; 
            font-size: 0.85rem; 
            margin-top: 4px; 
            font-weight: 500;
        }
        #container-list {
            max-height: 75vh;
            overflow-y: auto;
            padding-right: 10px;
        }
        #container-list::-webkit-scrollbar {
            width: 6px;
        }
        #container-list::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="alert alert-dark shadow-custom total-badge text-white bg-dark" id="total-weight-display">
        Total Muatan: <span id="weight-value" class="fw-bold">0</span> kg
    </div>

    <div class="container-fluid px-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-primary">WowoClean</h1>
            <p class="text-muted">Sistem Dashboard Logistik Pengelolaan Limbah B3</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card shadow-custom p-4">
                    <h4 class="mb-4 fw-bold text-dark border-bottom pb-2">Input Kontainer Baru</h4>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">ID Kontainer</label>
                        <input type="text" id="container_id" class="form-control form-control-lg" placeholder="Contoh: CB31097">
                        <span id="err-container_id" class="error-msg"></span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Tipe Limbah</label>
                        <select id="waste_type" class="form-select form-select-lg text-muted">
                            <option value="Chemical">Chemical</option>
                            <option value="Solid">Solid</option>
                            <option value="Liquid">Liquid</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Berat Kontainer (kg)</label>
                        <input type="number" id="weight_kg" class="form-control form-control-lg" placeholder="10 - 5000">
                        <span id="err-weight_kg" class="error-msg"></span>
                    </div>

                    <button id="btn-save" class="btn btn-primary btn-lg w-100 mt-3 fw-bold shadow-sm">
                        Simpan ke Sistem
                    </button>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold text-dark border-bottom pb-2 flex-grow-1">Daftar Kontainer Aktif</h4>
                </div>
                
                <div id="container-list">
                    <div class="text-center py-5 text-muted bg-white rounded shadow-custom">
                        <p>Memuat data kontainer...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
